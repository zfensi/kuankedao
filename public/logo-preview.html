<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>宽客岛 Logo 方案预览</title>
    <style>
      :root { color-scheme: light; }
      body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
      .wrap { max-width: 1120px; margin: 0 auto; padding: 32px 20px 56px; }
      h1 { margin: 0 0 8px; font-size: 32px; }
      p { margin: 0 0 24px; color: #94a3b8; }
      .grid { display: grid; grid-template-columns: 1fr; gap: 18px; }
      .card { background: rgba(15, 23, 42, 0.75); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 24px; padding: 16px; }
      .meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 12px; }
      .badge { display: inline-flex; padding: 6px 10px; border-radius: 999px; background: rgba(14, 165, 233, 0.15); color: #67e8f9; font-size: 12px; }
      img { width: 100%; height: auto; display: block; border-radius: 18px; background: white; }
      .tips { margin-top: 24px; padding: 16px 18px; border-radius: 18px; background: rgba(15,23,42,0.5); border: 1px solid rgba(148, 163, 184, 0.18); }
      @media (min-width: 900px) { .grid { grid-template-columns: 1fr 1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>宽客岛 Logo 方案</h1>
      <p>请直接告诉我编号，例如“选 2”或“2 和 6 再微调”。</p>
      <div class="grid">
        <div class="card"><div class="meta"><strong>方案 1</strong><span class="badge">科技感字母标</span></div><img src="/logo-options/logo-01.svg" alt="logo 01" /></div>
        <div class="card"><div class="meta"><strong>方案 2</strong><span class="badge">罗盘导航</span></div><img src="/logo-options/logo-02.svg" alt="logo 02" /></div>
        <div class="card"><div class="meta"><strong>方案 3</strong><span class="badge">链路符号</span></div><img src="/logo-options/logo-03.svg" alt="logo 03" /></div>
        <div class="card"><div class="meta"><strong>方案 4</strong><span class="badge">网络聚合</span></div><img src="/logo-options/logo-04.svg" alt="logo 04" /></div>
        <div class="card"><div class="meta"><strong>方案 5</strong><span class="badge">岛屿品牌感</span></div><img src="/logo-options/logo-05.svg" alt="logo 05" /></div>
        <div class="card"><div class="meta"><strong>方案 6</strong><span class="badge">徽章 app icon 向</span></div><img src="/logo-options/logo-06.svg" alt="logo 06" /></div>
      </div>
      <div class="tips">建议优先看：如果你更重品牌识别，选 1 或 5；如果更重 SEO/外链行业表达，选 2、3、4；如果更重 app icon 适配，选 6。</div>
    </div>
  </body>
</html>
